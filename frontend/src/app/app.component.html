<div class="app-container">
  <header class="header">
    <nav class="nav">
      <a routerLink="/" class="logo">Znaki Drogowe</a>
      <div class="nav-links">
        <a routerLink="/" class="nav-link">Start</a>
        <a routerLink="/course" class="nav-link">Kurs</a>
        <a routerLink="/quiz" class="nav-link">Quiz</a>
        <a routerLink="/auth" class="nav-link" *ngIf="!(currentUser$ | async)">Zaloguj</a>
        <button class="nav-link nav-btn" *ngIf="currentUser$ | async as user" (click)="onLogout()">
          Wyloguj ({{ user.displayName || user.username }})
        </button>
      </div>
    </nav>
  </header>
  
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  
  <footer class="footer">
    <p>&copy; 2025 Znaki Drogowe - Nauka dla Dzieci</p>
  </footer>
</div>
