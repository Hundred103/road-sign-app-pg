server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: sign-service
          uri: ${SIGN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/signs/**
          filters:
            - StripPrefix=1

        - id: quiz-service
          uri: ${QUIZ_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/quiz/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: frontend-service
          uri: ${FRONTEND_URL:http://frontend:80}
          predicates:
            - Path=/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
